server {
    listen 80;
    server_name shugu.spoukie.uk;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name shugu.spoukie.uk;

    ssl_certificate /etc/letsencrypt/live/shugu.spoukie.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shugu.spoukie.uk/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # No basic auth here — the app has its own JWT login for operator;
    # visitors are intentionally anonymous and constrained by server-side
    # moderation + rate limiting (see backend/shugu/adapters/moderation_basic.py).

    client_max_body_size 10m;
    proxy_read_timeout 3600s;   # WS can be long-lived
    proxy_connect_timeout 30s;
    proxy_send_timeout 60s;

    # Backend WebSocket endpoints (/visitor/ws, /operator/ws)
    location /ws {
        proxy_pass http://127.0.0.1:8701;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend auth + REST
    location /auth/ {
        proxy_pass http://127.0.0.1:8701;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/ {
        proxy_pass http://127.0.0.1:8701;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend Next.js static assets
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3100;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Frontend Next.js
    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
