# LiveKit server config — self-hosted Windows (Shugu v4 Phase 3a).
#
# Les API keys/secrets sont fournis via variables d'environnement au lancement
# (LIVEKIT_KEYS="<key>: <secret>") ou via CLI flag. NE PAS hardcoder ici.
#
# Ports :
#   7880 = HTTP/WS API (public via CFT → wss://livekit.spoukie.uk)
#   7881 = WebRTC TCP fallback
#   5349 = TURN TCP (public via CFT → turns://turn.spoukie.uk sur 443)
#   50000-60000/udp = WebRTC UDP (pas exposé via CFT — NAT hole-punching
#                                  via TURN TCP pour les clients derrière NAT restrictif)

port: 7880

rtc:
  tcp_port: 7881
  # Range UDP — utilisé si le client peut sortir en UDP (idéal perf).
  # Sinon le fallback TURN-TCP prend le relais.
  port_range_start: 50000
  port_range_end: 50500
  use_external_ip: true

# TURN server intégré (pour les clients VIP derrière NAT restrictif).
# TLS géré par Cloudflare Tunnel en front — on fait du TCP clair en interne.
turn:
  enabled: true
  tcp_port: 5349
  domain: turn.spoukie.uk

# Logging
logging:
  level: info
  json: false

# Redis optionnel — pour multi-instance (pas nécessaire pour notre single-node).
# redis:
#   address: localhost:6379
#   db: 2

# Development helpers
development: false
