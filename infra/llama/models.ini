version = 1

# Default tunes — max sur 7800 XT 16GB pour Gemma 4 E4B (4B effective, ~6GB VRAM).
# 10GB VRAM libre absorbent le KV cache 131k natif sans souci.
[*]
n-gpu-layers = 99
batch-size = 8192
ubatch-size = 2048
ctx-size = 131072
cache-type-k = f16
cache-type-v = f16
flash-attn = on
threads = 10
threads-batch = 10
parallel = 1
device = Vulkan0
jinja = true

# Modèle MVP — Gemma 4 26B-A4B IQ4_XS (MoE 4B actifs, 26B total).
# Full GPU sur 7800 XT 16GB : 12.5 GB modèle + ~1 GB KV/buffers = ~13.5 GB,
# laisse ~2 GB pour Whisper STT concurrent.
# Bench : TTFB 187ms (chaud), 43 tok/s gen, 288 tok/s prompt eval.
# Tool calling : 3/4 cas déclenchés (web_search, set_avatar_emotion, play_emote).
# Format tool_call custom Gemma : <|tool_call>call:NAME{key:<|"|>val<|"|>}<tool_call|>
# → custom parser dans backend/shugu/voice/regie/tool_call_parser.py
[gemma4]
model = E:/ai/models/gemma4-26b/gemma-4-26B-A4B-it-UD-IQ4_XS.gguf
load-on-startup = true
stop-timeout = 30
