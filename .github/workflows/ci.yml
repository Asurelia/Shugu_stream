name: CI

# Déclencheurs — on lance sur push de toutes les branches feat/* + main, et
# sur PR ciblant main. Les branches hotfix/* y seraient également soumises si
# on en créait : `**` capture tous les motifs. Volontairement restrictif sur
# les PR : le lint + les tests unit tournent sur la branche source avant merge,
# pas besoin de re-run sur main si on fast-forward.
on:
  push:
    branches:
      - main
      - 'feat/**'
      - 'hotfix/**'
  pull_request:
    branches:
      - main

# Concurrency : si un push arrive pendant qu'un run est en cours sur la même
# branche, on cancel l'ancien. Économise des minutes CI sur les itérations
# rapides (commit → fix → commit → fix).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint + tests (unit + integration)
    runs-on: ubuntu-latest
    # Timeout raisonnable : ~5-8 min pour l'install Python (faster-whisper +
    # torch sont lourds), 2 min pour services Docker + migration + tests.
    # 20 min laisse de la marge sur cache froid, fail-fast au-delà.
    timeout-minutes: 20

    # Services Docker — lancés par GitHub Actions avant le 1er `run:`, avec
    # healthchecks pour que le job attende qu'ils soient prêts. Brique 1.4
    # finalisation — les tests d'intégration peuvent enfin tourner en CI.
    services:
      postgres:
        # Image `pgvector/pgvector:pg16` = Postgres 16 officiel + extension
        # pgvector précompilée + pg_trgm core. Évite d'avoir à compiler
        # l'extension dans le workflow.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: shugu
          POSTGRES_PASSWORD: shugu
          POSTGRES_DB: shugu_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    # Variables d'env partagées par TOUS les steps — migrations alembic +
    # pytest y piochent. `VIP_INTERNAL_SECRET` fake pour que les tests
    # d'intégration du router VIP (s'il y en avait) ne retournent pas 401.
    env:
      SHUGU_POSTGRES_DSN: postgresql+asyncpg://shugu:shugu@localhost:5432/shugu_test
      SHUGU_REDIS_URL: redis://localhost:6379/0
      # Les tests d'intégration lisent `TEST_DATABASE_URL` > `DATABASE_URL`.
      # DATABASE_URL reste standard pour compat avec les outils CI tiers.
      DATABASE_URL: postgresql+asyncpg://shugu:shugu@localhost:5432/shugu_test
      VIP_INTERNAL_SECRET: ci-test-secret-not-real
      # ENV=ci désactive le validator strict ip_hash_salt (cf config.py — Mémoire PR 2 fix M1).
      # Sans ça, alembic upgrade plante car ip_hash_salt vide en prod par défaut.
      # Les fields s'appellent `env` et `ip_hash_salt` (sans prefix shugu_) → env vars sans prefix.
      ENV: ci
      # Salt fictif pour les tests integration qui hashent des IPs viewer.
      # Pas un secret réel — l'env CI est éphémère et isolé.
      IP_HASH_SALT: ci-fixture-salt-not-secret

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'backend/pyproject.toml'

      - name: Install backend + dev deps
        working-directory: backend
        # On installe le package en editable (-e) pour que `import shugu.*`
        # marche depuis `backend/tests/`. Les extras [dev] amènent pytest +
        # pytest-asyncio + fakeredis + respx + ruff.
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Ruff lint
        # Phase 1 résiduel : les 90 erreurs pré-existantes ont été nettoyées
        # (75 auto-fix + 15 manuelles dont 1 F821 qui était un vrai bug —
        # `asyncio` référencé en annotation sans import module-level dans
        # `routes/operator_ws.py`).
        #
        # Scope étendu à `backend/shugu/` complet + tests + alembic. Les
        # nouveaux fichiers sont automatiquement lintés.
        run: ruff check backend/shugu backend/tests backend/alembic

      - name: Run alembic migrations
        working-directory: backend
        # Crée les tables `shugu_test` + extensions pgvector/pg_trgm
        # (via la migration 0005_memory_agent). Sans ce step, les tests
        # d'intégration `test_memory_*` crasheraient au 1er SELECT.
        run: alembic upgrade head

      - name: Pytest — tests unit (rapides, sans services)
        working-directory: backend
        # `-m "not integration"` est défensif : tests/unit/ ne contient pas
        # de marker `integration`, mais on garde la consigne par clarté et
        # pour que le dev puisse runner pareil en local sans DB.
        run: pytest tests/unit/ -v -m "not integration"

      - name: Pytest — tests integration (services Docker requis)
        working-directory: backend
        # tests/integration/test_memory_agent_db.py a un `pytestmark = integration`
        # module-level — pas besoin de `-m integration` pour les inclure via path.
        # Les tests qui dépendent vraiment de pgvector/pg_trgm vérifieront leur
        # existence (extensions chargées par migration 0005 ci-dessus).
        run: pytest tests/integration/ -v

  # Sprint A migration plan — frontend a longtemps été shippé sans CI. Ce job
  # locke le baseline avant le bump Next 13 → 14 → 15 → 16. Le scope est
  # volontairement minimaliste : lint + test (Vitest unit) + build prod. Pas
  # de Playwright ici (Three.js + VRM 28 MB → flaky en CI), ces e2e restent
  # runnables en local (`npm run e2e`).
  frontend-ci:
    name: Frontend (lint + test + build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Test (Vitest)
        working-directory: frontend
        run: npm test -- --run

      - name: Build
        working-directory: frontend
        # NEXT_PUBLIC_BASE_PATH vide en CI — l'app cible shugu.spoukie.uk
        # depuis la racine. Le préfixe NEXT_PUBLIC_ est requis pour que
        # Next.js inline la valeur dans le bundle client (publicRuntimeConfig
        # supprimé en Next 16, lecture build-time uniquement).
        env:
          NEXT_PUBLIC_BASE_PATH: ""
        run: npm run build
